name: FinanceTracker CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./application-projects/FinanceTracker

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0'

    - name: Restore dependencies
      run: dotnet restore FinanceTracker.slnx

    - name: Build
      run: dotnet build --no-restore --no-restore

    - name: Test
      run: dotnet test --no-restore --no-build